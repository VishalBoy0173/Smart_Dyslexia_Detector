{% extends "base.html" %}

{% block title %}Canvas Writing - DyslexiAI{% endblock %}
{% block topbar_title %}✍️ <span>Canvas Writing</span>{% endblock %}

{% block content %}
<style>
    .canvas-container { max-width: 950px; margin: 0 auto; }
    .canvas-area { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
    .guide-note { background: var(--primary-bg); border-radius: var(--radius-sm); padding: 0.7rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--primary); }
    .canvas-wrapper { display: inline-block; border: 2px solid var(--border); border-radius: var(--radius-sm); background: white; }
    #writingCanvas { display: block; cursor: crosshair; background: white; }
    .action-buttons { margin-top: 1.2rem; display: flex; justify-content: center; gap: 1rem; }
    .level-selector { margin: 0.8rem 0; display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; }
    .level-selector button { padding: 0.5rem 1.2rem; border: 2px solid var(--border); border-radius: 25px; cursor: pointer; font-weight: 600; background: white; color: var(--text-muted); }
    .level-selector button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .word-display { font-size: 5rem; font-weight: 900; color: var(--primary); background: var(--primary-bg); padding: 0.3rem 0.8rem; border-radius: var(--radius-sm); margin: 0.5rem 0; }
</style>

<div class="canvas-container">
    <div class="word-prompt-card">
        <div class="word-prompt-label">📝 Write This Word</div>
        <div class="level-selector">
            <button onclick="changeLevel('easy')" id="btnEasy" class="active">Easy</button>
            <button onclick="changeLevel('medium')" id="btnMedium">Medium</button>
            <button onclick="changeLevel('hard')" id="btnHard">Hard</button>
        </div>
        <div style="margin:0.5rem 0;">
            <select id="themeSelect" onchange="changeTheme()" class="form-select" style="width:auto;display:inline-block;">
                <option value="">📚 All Words</option>
                <option value="animals">🐾 Animals</option>
                <option value="food">🍎 Food</option>
                <option value="colors">🎨 Colors</option>
            </select>
            <button onclick="toggleLanguage()" id="langBtn" class="btn btn-sm" style="background:rgba(255,255,255,0.2); color:white;">🇬🇧 English</button>
        </div>
        <div class="word-display" id="wordDisplay">dog</div>
        <button class="btn btn-ghost btn-sm" onclick="newWord()">🔄 New Word</button>
        <p class="word-prompt-hint" id="levelLabel">3 letters</p>
    </div>
    <input type="hidden" id="expectedWord" value="dog">

    <div class="canvas-area mt-2">
        <h3>Write in the Boxes</h3>
        <div class="guide-note">Write <strong>one letter per box</strong> using small letters.</div>
        <div class="canvas-wrapper">
            <canvas id="writingCanvas" width="600" height="180"></canvas>
        </div>
        <div class="action-buttons">
            <button class="btn btn-danger" onclick="confirmClear()">Clear</button>
            <button class="btn btn-success" onclick="submitCanvas()" id="analyzeCanvasBtn">Check My Word</button>
        </div>
        <div class="loading-row" id="canvasLoading"><div class="spinner"></div> Checking your word...</div>
    </div>

    <div class="stars-row flex-center mt-2" id="starProgress" style="display:none;"><span id="starsDisplay"></span></div>
    <div class="result-box" id="resultBox">
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-message" id="resultMessage"></div>
        <button class="btn btn-primary" onclick="newWordAndReset()">🔄 Try Another Word</button>
    </div>
</div>

<script>
    // ---------- Word lists (same as upload.html) ----------
    const wordLists = {
        easy: { default: ['dog','cat','big','bed','pig','cup','sun','hat','run','box','map','bus','pen','top','pin','bag','log','pot','dig','bug'],
                animals: ['dog','cat','pig','cow','hen','bat','fox','owl','bee','ant'],
                food: ['bun','jam','pie','nut','egg','fig','yam','rye','ham','pea'],
                colors: ['red','tan','blue','pink','lime','teal','plum','rose','navy','gold'] },
        medium: { default: ['baby','blue','brown','queen','power','water','wake','name','duck','bird','play','jump','read','park','ball','down'],
                  animals: ['duck','bird','fish','bear','deer','frog','wolf','seal','crab','dove'],
                  food: ['bread','apple','grape','peach','mango','berry','lemon','olive','prune','dates'],
                  colors: ['purple','silver','bronze','violet','indigo','maroon','copper','crimson'] },
        hard: { default: ['bridge','dragon','bubble','purple','window','mirror','number','quarter','dinner','double','pretty','wonder','blanket','problem'],
                animals: ['rabbit','dragon','puppy','pony','eagle','zebra','whale','tiger','mouse','snail'],
                food: ['banana','cherry','orange','potato','tomato','carrot','celery','raisin','walnut','almond'],
                colors: ['magenta','turquoise','lavender','chartreuse','cerulean','vermillion'] }
    };
    let currentLevel = 'easy', currentTheme = '', currentLang = 'english';
    const levelLabels = {'easy':'3 letters','medium':'4-5 letters','hard':'6-8 letters'};

    function changeLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-selector button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn${level.charAt(0).toUpperCase()+level.slice(1)}`).classList.add('active');
        document.getElementById('levelLabel').textContent = levelLabels[level];
        newWord();
    }
    function changeTheme() { currentTheme = document.getElementById('themeSelect').value; newWord(); }
    function toggleLanguage() {
        currentLang = currentLang === 'english' ? 'malay' : 'english';
        document.getElementById('langBtn').textContent = currentLang === 'english' ? '🇬🇧 English' : '🇲🇾 Malay';
        newWord();
    }
    async function fetchNewWord() {
        try {
            let url = `/api/get_word?level=${currentLevel}`;
            if(currentTheme) url += `&theme=${currentTheme}`;
            if(currentLang === 'malay') url += '&lang=malay';
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('wordDisplay').textContent = data.word;
            document.getElementById('expectedWord').value = data.word;
        } catch(err) {
            const themeWords = wordLists[currentLevel]?.[currentTheme] || wordLists[currentLevel].default;
            const word = themeWords[Math.floor(Math.random() * themeWords.length)];
            document.getElementById('wordDisplay').textContent = word;
            document.getElementById('expectedWord').value = word;
        }
    }
    function newWord() { fetchNewWord(); clearCanvas(); hideResult(); }
    function newWordAndReset() { newWord(); window.scrollTo({top:0,behavior:'smooth'}); }
    function hideResult() { document.getElementById('resultBox').style.display = 'none'; document.getElementById('starProgress').style.display = 'none'; }
    function showResult(emoji, title, message, bgColor, borderColor) {
        const box = document.getElementById('resultBox');
        box.style.display = 'block';
        box.style.background = bgColor;
        box.style.border = `3px solid ${borderColor}`;
        document.getElementById('resultEmoji').textContent = emoji;
        document.getElementById('resultTitle').textContent = title;
        document.getElementById('resultMessage').textContent = message;
        if(title === 'Perfect!') playGlobalSound('correct');
        else if(title === 'Dyslexia Detected') playGlobalSound('reversal');
        else playGlobalSound('error');
        fetchStars();
        box.scrollIntoView({behavior:'smooth'});
    }
    async function fetchStars() {
        try {
            const res = await fetch('/api/user/stats');
            const d = await res.json();
            document.getElementById('starsDisplay').innerHTML = '⭐'.repeat(d.stars) + '☆'.repeat(5-d.stars);
            document.getElementById('starProgress').style.display = 'flex';
        } catch(e) {}
    }
    // Canvas drawing logic
    const canvas = document.getElementById('writingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    const BOX_SIZE = 70, BOX_GAP = 4, TOP_MARGIN = 55;
    function drawLetterBoxes() {
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const word = document.getElementById('expectedWord').value || 'dog';
        const letterCount = word.length;
        const totalWidth = letterCount * BOX_SIZE + (letterCount-1)*BOX_GAP;
        const startX = (canvas.width - totalWidth)/2;
        for(let i=0;i<letterCount;i++) {
            const x = startX + i*(BOX_SIZE+BOX_GAP), y = TOP_MARGIN;
            ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 0.3; ctx.setLineDash([]);
            ctx.strokeRect(x,y,BOX_SIZE,BOX_SIZE);
            ctx.strokeStyle = '#ECECEC'; ctx.lineWidth = 0.2; ctx.setLineDash([3,5]);
            ctx.beginPath(); ctx.moveTo(x+8, y+BOX_SIZE/2); ctx.lineTo(x+BOX_SIZE-8, y+BOX_SIZE/2); ctx.stroke();
        }
        ctx.setLineDash([]); ctx.strokeStyle = '#000000'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    }
    function clearCanvas() { drawLetterBoxes(); }
    function confirmClear() { if(confirm('Clear your writing?')) clearCanvas(); }
    drawLetterBoxes();

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
        let cx, cy;
        if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: Math.max(0, Math.min(canvas.width, (cx-rect.left)*sx)), y: Math.max(0, Math.min(canvas.height, (cy-rect.top)*sy)) };
    }
    canvas.addEventListener('mousedown', (e) => { drawing=true; const p=getCoords(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('mousemove', (e) => { if(!drawing) return; const p=getCoords(e); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('mouseup', () => { drawing=false; });
    canvas.addEventListener('mouseleave', () => { drawing=false; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing=true; const p=getCoords(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!drawing) return; const p=getCoords(e); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
    canvas.addEventListener('touchend', () => { drawing=false; });

    async function submitCanvas() {
        document.getElementById('canvasLoading').style.display = 'block';
        document.getElementById('analyzeCanvasBtn').disabled = true;
        hideResult();
        const outCanvas = document.createElement('canvas');
        outCanvas.width = canvas.width; outCanvas.height = canvas.height;
        const outCtx = outCanvas.getContext('2d');
        outCtx.fillStyle = '#FFFFFF'; outCtx.fillRect(0,0,outCanvas.width,outCanvas.height);
        outCtx.drawImage(canvas,0,0);
        const imageData = outCtx.getImageData(0,0,outCanvas.width,outCanvas.height);
        const d = imageData.data;
        for(let i=0;i<d.length;i+=4) {
            const brightness = (d[i]+d[i+1]+d[i+2])/3;
            if(brightness<200) { d[i]=0; d[i+1]=0; d[i+2]=0; }
            else { d[i]=255; d[i+1]=255; d[i+2]=255; }
        }
        outCtx.putImageData(imageData,0,0);
        const expectedWord = document.getElementById('expectedWord').value.trim();
        outCanvas.toBlob(async (blob) => {
            const fd = new FormData();
            fd.append('image', blob, 'canvas.png');
            fd.append('expected_word', expectedWord);
            try {
                const res = await fetch('/predict', { method:'POST', body:fd });
                const data = await res.json();
                document.getElementById('canvasLoading').style.display = 'none';
                document.getElementById('analyzeCanvasBtn').disabled = false;
                if(data.error) { showResult('⚠️','Oops!',data.error,'#fff8e6','#f39c12'); return; }
                if(data.is_correct) {
                    showResult('🌟','Perfect!',data.fun_feedback,'#e6ffe6','#27ae60');
                } else if(data.has_dyslexia) {
                    showResult('🔍','Dyslexia Detected',data.fun_feedback,'#ffe6e6','#e74c3c');
                } else if(data.result_level === 'Incorrect Word') {
                    showResult('❌','Incorrect Word',data.fun_feedback,'#fff0e0','#e67e22');
                } else {
                    showResult('📝','No Dyslexia',data.fun_feedback,'#fff8e6','#f39c12');
                }
            } catch(err) {
                document.getElementById('canvasLoading').style.display = 'none';
                document.getElementById('analyzeCanvasBtn').disabled = false;
                showResult('⚠️','Error','Network error.','#ffe6e6','#e74c3c');
            }
        }, 'image/png');
    }
    fetchNewWord();
    fetchStars();
</script>
{% endblock %}
